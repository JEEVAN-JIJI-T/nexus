<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NEXUS Academy</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script> tailwind.config = { darkMode: 'class' } </script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>

<body class="transition-colors duration-300 bg-[color-scheme:light] text-black dark:bg-[#0A0A0A] dark:text-white">

<!-- NAVBAR -->
<header class="backdrop-blur-md bg-white/10 dark:bg-black/20 sticky top-0 z-50 shadow-lg">
  <div class="w-full px-6 md:px-14 py-5 flex items-center justify-between">

    <!-- LOGO LEFT -->
    <a href="/" class="flex items-center gap-3">
      <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="logo"
        class="w-12 h-12 rounded-md object-cover" onerror="this.style.display='none'">
      <span class="text-xl font-bold tracking-wide">NEXUS Academy</span>
    </a>

    <!-- NAV LINKS + THEME ICON RIGHT -->
    <div class="flex items-center gap-8">

      <!-- MAIN NAV -->
      <nav class="hidden md:flex gap-8 text-lg nav-links" aria-label="Main navigation">
        <a href="/" class="nav-link">Home</a>
        <a href="/programs" class="nav-link">Programs</a>
        <a href="/gallery" class="nav-link">Gallery</a>
        <a href="/contact" class="nav-link">Contact</a>
      </nav>

      <!-- THEME ICON BUTTON -->
      <button id="themeToggle" class="p-2 rounded-lg bg-white/10 dark:bg-white/6 hover:bg-white/20 transition" aria-label="Toggle theme">
        <!-- Sun icon (light) -->
        <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364 6.364l-1.414-1.414M7.05 7.05L5.636 5.636m12.728 0l-1.414 1.414M7.05 16.95l-1.414 1.414"/><circle cx="12" cy="12" r="4"/>
        </svg>
        <!-- Moon icon (dark) -->
        <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 0111.21 3 7 7 0 0012 17a7 7 0 009-4.21z" />
        </svg>
      </button>

      <!-- MOBILE MENU BUTTON -->
      <button id="mobileMenuBtn" class="md:hidden p-2 rounded-lg bg-white/10 dark:bg-white/6 hover:bg-white/20 transition" aria-expanded="false" aria-controls="mobileMenu">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>

  </div>

  <!-- MOBILE MENU -->
  <div id="mobileMenu" class="md:hidden hidden bg-white/95 dark:bg-[#0A0A0A] border-t border-black/5 dark:border-white/6">
    <div class="flex flex-col px-6 py-4 gap-3 text-lg">
      <a href="/" class="py-2 px-3 rounded hover:bg-black/6 dark:hover:bg-white/5">Home</a>
      <a href="/programs" class="py-2 px-3 rounded hover:bg-black/6 dark:hover:bg-white/5">Programs</a>
      <a href="/gallery" class="py-2 px-3 rounded hover:bg-black/6 dark:hover:bg-white/5">Gallery</a>
      <a href="/contact" class="py-2 px-3 rounded hover:bg-black/6 dark:hover:bg-white/5">Contact</a>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="w-full px-6 md:px-14 lg:px-24 py-10">
  {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="w-full px-6 md:px-14 lg:px-24 py-8 text-sm text-gray-700 dark:text-gray-300">
  <div class="flex flex-col md:flex-row justify-between">
    <strong>NEXUS Academy</strong>
    <span>nexusacademykerala@gmail.com · +91 73063 87009</span>
  </div>
</footer>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/mobile.js') }}"></script>
<script src="{{ url_for('static', filename='js/reveal.js') }}"></script>
<script src="{{ url_for('static', filename='js/micro.js') }}"></script>
</body>
</html>
