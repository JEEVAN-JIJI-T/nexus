{% extends 'base.html' %}
{% block content %}
<section class="max-w-7xl mx-auto">
  <h1 class="text-3xl md:text-4xl font-extrabold mb-4 text-black dark:text-white">Gallery</h1>
  <p class="text-gray-700 dark:text-gray-300 mb-6">Photos from sessions and workshops. Replace placeholders with real images in <code>static/assets/</code>.</p>

  <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-6">
    {% for i in range(1,7) %}
      <div class="rounded-lg overflow-hidden glass-card" data-reveal>
        <img src="{{ url_for('static', filename='assets/gallery' ~ i ~ '.jpg') }}" alt="gallery {{ i }}" class="w-full h-52 object-cover" onerror="this.style.opacity='0.25'">
      </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
