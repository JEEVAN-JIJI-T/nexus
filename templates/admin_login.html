{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">

  <div class="glass max-w-md w-full p-8 text-center">

    <h1 class="text-2xl font-bold mb-6">Admin Login</h1>

    <form method="POST" class="space-y-4">

      <input 
        name="username"
        placeholder="Username"
        required
        class="w-full p-3 rounded bg-white/90 dark:bg-white/5 text-black dark:text-white outline-none"
      >

      <input 
        name="password"
        type="password"
        placeholder="Password"
        required
        class="w-full p-3 rounded bg-white/90 dark:bg-white/5 text-black dark:text-white outline-none"
      >

      <button 
        type="submit"
        class="btn-primary w-full ripple">
        Login
      </button>

    </form>

  </div>

</div>
{% endblock %}
