{% extends 'base.html' %}
{% block content %}
<section class="max-w-3xl mx-auto">
  <h1 class="text-3xl font-extrabold mb-4 text-black dark:text-white">Contact</h1>
  <p class="text-gray-700 dark:text-gray-300 mb-6">Reach out to enroll or to request a workshop.</p>

  <form class="grid gap-3">
    <label class="sr-only" for="name">Name</label>
    <input id="name" class="p-3 rounded bg-white/90 dark:bg-white/5 text-black dark:text-white" placeholder="Your name" />

    <label class="sr-only" for="email">Email</label>
    <input id="email" class="p-3 rounded bg-white/90 dark:bg-white/5 text-black dark:text-white" placeholder="Email" />

    <label class="sr-only" for="message">Message</label>
    <textarea id="message" class="p-3 rounded bg-white/90 dark:bg-white/5 text-black dark:text-white" placeholder="Message"></textarea>

    <div class="flex gap-3">
      <button type="button" class="px-4 py-2 rounded btn-primary ripple">Send</button>
      <a href="/programs" class="px-4 py-2 rounded border border-black/8 dark:border-white/8 hover:bg-black/6 dark:hover:bg-white/5">View Programs</a>
    </div>
  </form>

  <div class="mt-6 text-gray-700 dark:text-gray-300">
    Phones: +91 73063 87009 · +91 94963 80478 · +91 80890 08217 · +91 90746 00979<br>
    Email: nexusacademykerala@gmail.com
  </div>
</section>
{% endblock %}
